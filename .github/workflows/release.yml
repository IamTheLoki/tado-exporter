name: Release

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Tests
        run: cargo test --release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. GitHub-Repository-Namen in Kleinbuchstaben umwandeln
      - name: Lowercase repository name for GHCR
        run: |
          echo "GHCR_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 2. Login bei Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Login bei der GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build & Push in beide Container Registries gleichzeitig (nur linux/amd64)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          # KORREKTUR: Nutzt ${{ env.GHCR_REPO }} statt ${{ github.repository }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tado-exporter:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tado-exporter:${{ github.event.release.tag_name }}
            ghcr.io/${{ env.GHCR_REPO }}:latest
            ghcr.io/${{ env.GHCR_REPO }}:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Binary als GitHub Release-Artefakt bereitstellen
      - name: Generate Release Artifacts
        uses: ncipollo/release-action@v1
        with:
          artifacts: "target/release/tado-exporter"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true