name: Release tag

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build, Release and Docker Push
    runs-on: ubuntu-latest

    # HIER EXPLIZIT EINTRAGEN: Überschreibt die Standard-Tokensicherheit für diesen Job
    permissions:
      contents: write
      packages: write
      id-token: write
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      # Moderne Toolchain ohne Node-Abhängigkeiten
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package asset
        run: tar -C target/${{ matrix.target }}/release -czf tado-exporter-${{ matrix.target }}.tar.gz tado-exporter

      # Aktualisiert von @v1 auf @v2, um die veraltete Node 20 Umgebung loszuwerden
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          artifacts: ./tado-exporter-${{ matrix.target }}.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- DOCKER BUILD & PUSH TO GHCR ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max